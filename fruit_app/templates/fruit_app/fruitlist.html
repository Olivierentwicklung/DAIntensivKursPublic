{% extends 'fruit_app/base.html'%}
<div>
  {% block content %}
  <h1>This is my fruit List</h1>
  <ul>
    {% for fruit in fruits %}
    <li>
      <strong>{{fruit.name}}:</strong> Gewicht - {{fruit.gewicht}}g, Farbe -
      {{fruit.farbe}}
      <br />
      <img src="{{fruit.img}}" alt="{{fruit.name}}" width="100" height="80" />
    </li>
    {% endfor %}
  </ul>
  <a href="http://127.0.0.1:8000/fruits/list/info"> Go to Info</a>

  {% endblock %}
</div>
